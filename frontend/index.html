<!DOCTYPE html>
<html lang="ki">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kikuyu Docs | Smart Autocomplete Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode" spellcheck="false" data-gramm="false" data-gramm_editor="false" data-ms-editor="false" translate="no" autocorrect="off" autocapitalize="off" autocomplete="off">
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Documents</h2>
                <div style="display:flex; gap:4px">
                    <button id="open-file-btn" class="toolbar-btn" title="Open Local File">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    </button>
                    <button id="new-doc-btn" class="toolbar-btn" title="New Document">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </div>
            <div class="doc-list" id="doc-list">
                <!-- Document items will be loaded here -->
            </div>
        </div>

        <div class="app-container" id="main-container" spellcheck="false">
            <!-- Toolbar Section -->
        <div class="toolbar-wrapper">
            <div class="toolbar">
                <div class="toolbar-group">
                    <button id="menu-btn" class="toolbar-btn" title="Toggle Sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <select id="header-select" class="toolbar-select" aria-label="Text formatting" title="Text formatting">
                        <option value="p">Normal Text</option>
                        <option value="h1">Heading 1</option>
                        <option value="h2">Heading 2</option>
                        <option value="h3">Heading 3</option>
                    </select>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button id="bold-btn" class="toolbar-btn" title="Bold (Ctrl+B)"><b>B</b></button>
                    <button id="italic-btn" class="toolbar-btn" title="Italic (Ctrl+I)"><i>I</i></button>
                    <button id="underline-btn" class="toolbar-btn" title="Underline (Ctrl+U)"><u>U</u></button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <input type="color" id="color-picker" class="toolbar-color" value="#000000" title="Text Color" aria-label="Text color">
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group actions">
                    <button id="theme-btn" class="toolbar-btn" title="Toggle Dark Mode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <button id="save-as-btn" class="toolbar-btn export-btn" title="Save File to PC">Save As</button>
                    <button id="export-word-btn" class="toolbar-btn export-btn" title="Export as Word Document">Export Word</button>
                    <button id="save-pdf-btn" class="toolbar-btn export-btn" title="Export as PDF">PDF</button>
                    <button id="clear-btn" class="toolbar-btn" title="Clear Editor">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Document Area -->
        <div id="page-container" class="document-container" spellcheck="false">
            <div id="page-1" class="a4-page" contenteditable="true" spellcheck="false" 
                 role="textbox" aria-multiline="true" aria-autocomplete="list" aria-haspopup="listbox" title="Kikuyu Text Editor"
                 data-gramm="false" data-gramm_editor="false" data-ms-editor="false" translate="no" autocorrect="off" autocapitalize="off" autocomplete="off">
                <h1>Mũratatara wa Gĩkũyũ</h1>
                <p>Andĩka magano maku haha...</p>
            </div>
        </div>

        <!-- Status Bar -->
        <div id="status-bar" class="status-bar">
            <div id="word-count">0 words</div>
            <div id="char-count">0 characters</div>
            <div id="page-count"></div> <!-- Optional now -->
            <div class="status-label">Kikuyu Docs v2.0</div>
        </div>

        <!-- Floating Suggestion Box -->
        <div id="suggestions" class="suggestions-container" role="listbox" aria-label="Suggestions"></div>
    </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
